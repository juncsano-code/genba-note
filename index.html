<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>現場帳 Ver.0.5 案件編集・ドラッグ対応</title>
<style>
  :root{
    --bg:#f4f6f8;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;
    --green:#16a34a;--blue:#2563eb;--orange:#f59e0b;--red:#dc2626;--dark:#111827;
    --shadow:0 10px 30px rgba(15,23,42,.10);--hour-h:50px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);}
  .app{max-width:430px;min-height:100vh;margin:0 auto;background:var(--bg);padding:env(safe-area-inset-top) 14px calc(86px + env(safe-area-inset-bottom));}
  header{display:flex;justify-content:space-between;align-items:center;padding:16px 4px 10px;}
  .hello .small{font-size:13px;color:var(--muted);}.hello .name{font-size:22px;font-weight:800;letter-spacing:.02em;margin-top:2px;line-height:1.25;}
  .gear{width:42px;height:42px;border-radius:50%;border:0;background:#fff;box-shadow:var(--shadow);font-size:20px;}
  .card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:16px;margin:12px 0;overflow:hidden;}
  .section-title{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:10px;}.site-name{font-size:24px;font-weight:900;margin:2px 0 6px;}
  .address,.schedule{font-size:14px;color:var(--muted);line-height:1.6;}.status-pill{display:inline-flex;align-items:center;gap:6px;background:#ecfdf5;color:#166534;border-radius:999px;padding:7px 11px;font-size:13px;font-weight:800;margin-top:12px;}
  .main-action{width:100%;border:0;border-radius:26px;min-height:112px;color:#fff;font-size:28px;font-weight:900;box-shadow:0 14px 30px rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px;touch-action:manipulation;}
  .main-action:active{transform:scale(.985);}.main-action.arrive{background:var(--green);}.main-action.start{background:var(--blue);}.main-action.break{background:var(--orange);}.main-action.leave{background:var(--red);}
  .sub-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}.sub-actions button{height:52px;border:0;border-radius:16px;background:#fff;box-shadow:var(--shadow);font-weight:800;font-size:15px;color:var(--dark);}

  /* スマホ表示ズレ修正版の日報（工数）スタイル */
  .day-note{font-size:12px;color:var(--muted);line-height:1.5;margin:0 0 10px;}
  .timetable-wrap{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;}
  .timetable{display:grid;grid-template-columns:48px 1fr;position:relative;overflow:visible;}
  .hour{border-right:1px solid var(--line);border-bottom:1px solid var(--line);height:var(--hour-h);font-size:11px;color:var(--muted);padding-top:4px;text-align:center;background:#fafafa;}
  .slot{border-bottom:1px solid var(--line);height:var(--hour-h);position:relative;background:#fff;}
  .eventsLayer{position:absolute;left:48px;right:0;top:0;bottom:0;pointer-events:none;}
  .block{border-radius:10px;padding:7px 9px 16px;color:#fff;font-size:12px;box-shadow:0 2px 8px #0002;position:absolute;left:5px;right:5px;min-height:42px;overflow:hidden;pointer-events:auto;touch-action:none;user-select:none;}
  .block strong{display:block;font-size:12px;line-height:1.25;}.block small{display:block;opacity:.95;line-height:1.35;padding-top:2px;}
  .block.work{background:#2563eb;}.block.move{background:#f59e0b;}.block.rest{background:#64748b;}.block.log{background:#16a34a;}
  .resize-handle{position:absolute;left:10px;right:10px;bottom:2px;height:12px;border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .resize-handle:after{content:'';width:42px;height:4px;border-radius:999px;background:#ffffffbb;display:block;}
  .mini-list{margin-top:10px;border-top:1px solid var(--line);padding-top:8px;}
  .mini-row{display:grid;grid-template-columns:54px 1fr;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);}.mini-row:last-child{border-bottom:0;}
  .mini-time{font-weight:900;color:var(--dark);}.mini-title{font-weight:850;font-size:14px;}.mini-note{font-size:12px;color:var(--muted);margin-top:2px;}

  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);width:min(390px,calc(100% - 28px));background:#111827;color:#fff;border-radius:18px;padding:15px 16px;box-shadow:0 14px 35px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.22s;font-weight:800;font-size:15px;z-index:20;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(430px,100%);height:72px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -10px 30px rgba(15,23,42,.08);}
  nav button{border:0;background:transparent;font-size:12px;font-weight:800;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}nav button .icon{font-size:22px;}nav button.active{color:var(--blue);}
  .gps-log{display:none;font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;}.admin-note{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;}
  .screen{display:none}.screen.active{display:block}
  .admin-header{display:flex;align-items:center;gap:10px;padding:14px 4px 8px}.back-btn{width:42px;height:42px;border:0;border-radius:50%;background:#fff;box-shadow:var(--shadow);font-size:20px}.admin-title{font-weight:900;font-size:22px}.admin-sub{font-size:12px;color:var(--muted);margin-top:2px}
  .admin-menu{display:grid;gap:10px}.admin-menu button{height:62px;border:0;border-radius:18px;background:#fff;box-shadow:var(--shadow);font-weight:900;font-size:16px;text-align:left;padding:0 16px;color:var(--text)}
  .form-grid{display:grid;gap:12px}.field label{display:block;font-size:12px;font-weight:900;color:var(--muted);margin:0 0 5px 2px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#fff;padding:13px 12px;font-size:16px;color:var(--text);font-family:inherit}.field textarea{min-height:78px;resize:vertical}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.save-btn{width:100%;height:58px;border:0;border-radius:18px;background:var(--blue);color:#fff;font-size:18px;font-weight:900;box-shadow:var(--shadow)}.ghost-btn{width:100%;height:52px;border:1px solid var(--line);border-radius:16px;background:#fff;font-weight:900;color:var(--text)}
  .case-card{border:1px solid var(--line);border-radius:18px;padding:13px;margin-top:10px;background:#fff}.case-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.case-name{font-size:17px;font-weight:900}.case-pill{font-size:11px;font-weight:900;border-radius:999px;padding:6px 9px;background:#eff6ff;color:#1d4ed8;white-space:nowrap}.case-meta{font-size:13px;color:var(--muted);line-height:1.55;margin-top:7px}.case-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}.case-actions button{height:42px;border:0;border-radius:13px;font-weight:900}.nav-btn{background:#ecfdf5;color:#166534}.edit-btn{background:#f3f4f6;color:#111827}

</style>
</head>
<body>
<div class="app">
  <main id="homeScreen" class="screen active">
  <header>
    <div class="hello"><div class="small" id="todayText"></div><div class="name">おはようございます<br>佐野 順也 さん</div></div>
    <button class="gear" title="管理者設定" onclick="showScreen('admin')">⚙</button>
  </header>
  <section class="card">
    <div class="section-title">📍 今日の現場</div><div class="site-name">A邸 改修工事</div>
    <div class="address">住所：御殿場市○○町 1-2-3</div><div class="schedule">予定：8:00〜17:00　床下地・造作工事</div><div class="status-pill" id="statusPill">未到着</div>
  </section>
  <button class="main-action arrive" id="mainBtn">📍 現場到着</button>
  <div class="sub-actions"><button onclick="addPhoto()">📷 写真</button><button onclick="openMemo()">📝 メモ</button></div>
  <section class="card">
    <div class="section-title">今日の日報（工数）</div>
    <p class="day-note">スマホ表示ズレ修正版と同じ、時間枠に沿ったタイムテーブル表示です。</p>
    <div class="timetable-wrap"><div class="timetable" id="timetable"></div></div>
    <div class="mini-list" id="miniList"></div>
    <div class="gps-log" id="gpsLog"></div>
  </section>
  <div class="admin-note">管理者のみ：右上⚙からマスター・集計へ</div>
  </main>

  <main id="adminScreen" class="screen">
    <div class="admin-header"><button class="back-btn" onclick="showScreen('home')">‹</button><div><div class="admin-title">管理者メニュー</div><div class="admin-sub">佐野さん専用：マスター・集計管理</div></div></div>
    <section class="card">
      <div class="admin-menu">
        <button onclick="showScreen('caseMaster')">📁 案件マスター</button>
        <button onclick="showToast('作業マスターは次版で作成します')">🛠 作業マスター</button>
        <button onclick="showToast('集計画面は次版で作成します')">📊 月末集計</button>
      </div>
    </section>
  </main>

  <main id="caseMasterScreen" class="screen">
    <div class="admin-header"><button class="back-btn" onclick="showScreen('admin')">‹</button><div><div class="admin-title">案件マスター</div><div class="admin-sub">現調予定から工事完了までの入口</div></div></div>
    <section class="card">
      <div class="section-title" id="caseFormTitle">新規案件登録 Ver.0.2</div>
      <div class="form-grid">
        <div class="field"><label>施主名</label><input id="ownerName" placeholder="例：山田様 / 〇〇建設" /></div>
        <div class="field"><label>住所</label><input id="caseAddress" placeholder="例：御殿場市〇〇町1-2-3" /></div>
        <div class="field"><label>位置情報・GoogleマップURL</label><textarea id="mapInfo" placeholder="Googleマップの共有URL、または緯度経度を貼り付け"></textarea></div>
        <div class="field-row">
          <div class="field"><label>予定工期 開始</label><input id="startDate" type="date" /></div>
          <div class="field"><label>予定工期 終了</label><input id="endDate" type="date" /></div>
        </div>
        <div class="field-row">
          <div class="field"><label>工事区分</label><select id="workType"><option>リフォーム</option><option>改修</option><option>新築</option><option>下請け</option></select></div>
          <div class="field"><label>案件状態</label><select id="caseStatus"><option>現調予定</option><option>現調完了</option><option>見積中</option><option>見積提出</option><option>受注</option><option>施工中</option><option>完了</option><option>失注</option><option>保留</option></select></div>
        </div>
        <div class="field"><label>メモ</label><textarea id="caseMemo" placeholder="LINE・メールで聞いた内容、注意点など"></textarea></div>
        <button class="save-btn" id="caseSaveBtn" onclick="saveCase()">案件を保存</button>
        <button class="ghost-btn" id="caseCancelBtn" onclick="cancelEditCase()" style="display:none">編集をキャンセル</button>
        <button class="ghost-btn" onclick="fillSampleCase()">サンプル入力</button>
      </div>
    </section>
    <section class="card">
      <div class="section-title">案件一覧</div>
      <div id="caseList"></div>
    </section>
  </main>
</div>
<div class="toast" id="toast">位置情報を取得しました</div>
<nav><button class="active"><span class="icon">🏠</span>ホーム</button><button><span class="icon">📅</span>日報</button><button><span class="icon">📷</span>写真</button><button><span class="icon">👤</span>マイページ</button></nav>
<script>
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const id = name==='home'?'homeScreen':name==='admin'?'adminScreen':'caseMasterScreen';
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
const CASE_KEY='genba_note_cases_v04';
let editingCaseId=null;
function loadCases(){try{return JSON.parse(localStorage.getItem(CASE_KEY)||'[]')}catch(e){return []}}
function saveCases(cases){localStorage.setItem(CASE_KEY,JSON.stringify(cases))}
function parseLatLng(text){
  const m=(text||'').match(/(-?\d+\.\d+)\s*[, ]\s*(-?\d+\.\d+)/);
  return m?{lat:m[1],lng:m[2]}:null;
}
function makeCaseName(owner,type){
  const o=(owner||'未入力').replace(/様$/,'');
  return `${o}様 ${type||'案件'}`;
}
function readCaseForm(){
  const owner=document.getElementById('ownerName').value.trim();
  const map=document.getElementById('mapInfo').value.trim();
  const type=document.getElementById('workType').value;
  const ll=parseLatLng(map);
  return {
    name:makeCaseName(owner,type), owner,
    address:document.getElementById('caseAddress').value.trim(), map,
    lat:ll?.lat||'', lng:ll?.lng||'',
    start:document.getElementById('startDate').value, end:document.getElementById('endDate').value,
    type, status:document.getElementById('caseStatus').value,
    memo:document.getElementById('caseMemo').value.trim()
  };
}
function writeCaseForm(c){
  document.getElementById('ownerName').value=c.owner||'';
  document.getElementById('caseAddress').value=c.address||'';
  document.getElementById('mapInfo').value=c.map||'';
  document.getElementById('startDate').value=c.start||'';
  document.getElementById('endDate').value=c.end||'';
  document.getElementById('workType').value=c.type||'リフォーム';
  document.getElementById('caseStatus').value=c.status||'現調予定';
  document.getElementById('caseMemo').value=c.memo||'';
}
function clearCaseForm(){
  ['ownerName','caseAddress','mapInfo','startDate','endDate','caseMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('workType').value='リフォーム';
  document.getElementById('caseStatus').value='現調予定';
}
function saveCase(){
  const data=readCaseForm();
  if(!data.owner){showToast('施主名を入力してください');return;}
  const cases=loadCases();
  if(editingCaseId){
    const idx=cases.findIndex(c=>c.id===editingCaseId);
    if(idx>=0){ cases[idx]={...cases[idx],...data,updatedAt:new Date().toISOString()}; }
    showToast('案件を更新しました');
  }else{
    cases.unshift({
      id:'CASE-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-6),
      ...data, createdAt:new Date().toISOString()
    });
    showToast('案件を保存しました');
  }
  saveCases(cases); renderCases(); cancelEditCase(true);
}
function editCase(id){
  const c=loadCases().find(x=>x.id===id);
  if(!c){showToast('案件が見つかりません');return;}
  editingCaseId=id; writeCaseForm(c);
  document.getElementById('caseFormTitle').textContent='案件を編集';
  document.getElementById('caseSaveBtn').textContent='変更を保存';
  document.getElementById('caseCancelBtn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function cancelEditCase(silent=false){
  editingCaseId=null; clearCaseForm();
  document.getElementById('caseFormTitle').textContent='新規案件登録 Ver.0.2';
  document.getElementById('caseSaveBtn').textContent='案件を保存';
  document.getElementById('caseCancelBtn').style.display='none';
  if(!silent)showToast('編集をキャンセルしました');
}
function deleteCase(id){
  const c=loadCases().find(x=>x.id===id);
  if(!c)return;
  if(!confirm(`${c.name} を削除しますか？`))return;
  saveCases(loadCases().filter(x=>x.id!==id));
  if(editingCaseId===id)cancelEditCase(true);
  renderCases(); showToast('案件を削除しました');
}
function fillSampleCase(){
  document.getElementById('ownerName').value='山田';
  document.getElementById('caseAddress').value='御殿場市〇〇町1-2-3';
  document.getElementById('mapInfo').value='35.300000, 138.935000';
  document.getElementById('workType').value='リフォーム';
  document.getElementById('caseStatus').value='現調予定';
  document.getElementById('caseMemo').value='LINEで現調依頼。浴室まわり確認。';
}
function openMap(info,address){
  const q=encodeURIComponent(info||address||'');
  if(!q){showToast('住所または位置情報が未入力です');return;}
  window.open('https://www.google.com/maps/search/?api=1&query='+q,'_blank');
}
function renderCases(){
  const cases=loadCases(); const list=document.getElementById('caseList'); if(!list)return;
  if(!cases.length){list.innerHTML='<div class="case-meta">まだ案件はありません。サンプル入力で操作感を確認できます。</div>';return;}
  list.innerHTML=cases.map(c=>`<div class="case-card"><div class="case-top"><div class="case-name">${escapeHtml(c.name)}</div><div class="case-pill">${escapeHtml(c.status)}</div></div><div class="case-meta">施主：${escapeHtml(c.owner)}<br>住所：${escapeHtml(c.address||'未入力')}<br>区分：${escapeHtml(c.type)}　工期：${escapeHtml(c.start||'未定')}〜${escapeHtml(c.end||'未定')}<br>${c.lat?`位置：${c.lat}, ${c.lng}<br>`:''}${escapeHtml(c.memo||'')}</div><div class="case-actions"><button class="nav-btn" onclick="openMap('${escapeAttr(c.map)}','${escapeAttr(c.address)}')">📍 ナビ</button><button class="edit-btn" onclick="editCase('${escapeAttr(c.id)}')">編集</button><button class="edit-btn" onclick="deleteCase('${escapeAttr(c.id)}')">削除</button></div></div>`).join('');
}
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function escapeAttr(s){return escapeHtml(s).replace(/`/g,'&#96;')}

const mainBtn=document.getElementById('mainBtn'),toast=document.getElementById('toast'),statusPill=document.getElementById('statusPill'),gpsLog=document.getElementById('gpsLog');
let state='arrive';
let entries=[
  {start:'08:00',end:'12:00',type:'work',title:'予定：A邸 改修工事',note:'床下地・造作工事'},
  {start:'12:00',end:'13:00',type:'rest',title:'予定：昼休み',note:'休憩'},
  {start:'13:00',end:'17:00',type:'work',title:'予定：A邸 改修工事',note:'造作工事'}
];
function mins(t){const [h,m]=t.split(':').map(Number);return h*60+m} function hhmm(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function nowHHMM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function getHourHeight(){const v=getComputedStyle(document.documentElement).getPropertyValue('--hour-h').trim();return parseFloat(v)||50;}
function renderTimetable(){
  const dayStart=6*60, hourH=getHourHeight(); let html='';
  for(let h=6;h<=21;h++){html+=`<div class="hour">${String(h).padStart(2,'0')}:00</div><div class="slot"></div>`}
  html+='<div class="eventsLayer">';
  entries.forEach((e,i)=>{const top=((mins(e.start)-dayStart)/60)*hourH; const height=Math.max(42,((mins(e.end)-mins(e.start))/60)*hourH-4); html+=`<div class="block ${e.type}" data-index="${i}" style="top:${top+2}px;height:${height}px"><strong>${e.start}-${e.end}</strong><small>${e.title}<br>${e.note||''}</small><span class="resize-handle" data-resize="1"></span></div>`});
  html+='</div>'; document.getElementById('timetable').innerHTML=html;
  enableBlockEditing();
  document.getElementById('miniList').innerHTML=entries.filter(e=>e.type==='log').map(e=>`<div class="mini-row"><div class="mini-time">${e.start}</div><div><div class="mini-title">${e.title}</div><div class="mini-note">${e.note||''}</div></div></div>`).join('') || '<div class="mini-row"><div class="mini-time">—</div><div><div class="mini-title">まだ実績記録はありません</div><div class="mini-note">現場到着ボタンで記録を開始します</div></div></div>';
}

function snap15(m){return Math.round(m/15)*15}
function enableBlockEditing(){
  const layer=document.querySelector('.eventsLayer');
  if(!layer)return;
  layer.querySelectorAll('.block').forEach(block=>{
    block.addEventListener('pointerdown',ev=>{
      const idx=Number(block.dataset.index);
      const e=entries[idx]; if(!e)return;
      ev.preventDefault();
      block.setPointerCapture(ev.pointerId);
      const hourH=getHourHeight(), dayStart=6*60, dayEnd=22*60;
      const startY=ev.clientY, originalStart=mins(e.start), originalEnd=mins(e.end), duration=originalEnd-originalStart;
      const isResize=ev.target && ev.target.dataset && ev.target.dataset.resize;
      const onMove=(moveEv)=>{
        const deltaMin=snap15((moveEv.clientY-startY)/hourH*60);
        if(isResize){
          let newEnd=Math.max(originalStart+15, originalEnd+deltaMin);
          newEnd=Math.min(dayEnd,newEnd);
          e.end=hhmm(newEnd);
        }else{
          let newStart=Math.max(dayStart, Math.min(dayEnd-duration, originalStart+deltaMin));
          newStart=snap15(newStart);
          e.start=hhmm(newStart); e.end=hhmm(newStart+duration);
        }
        renderTimetable();
      };
      const onUp=()=>{
        try{block.releasePointerCapture(ev.pointerId)}catch(_e){}
        window.removeEventListener('pointermove',onMove);
        window.removeEventListener('pointerup',onUp);
        showToast(isResize?'終了時刻を変更しました':'時間を移動しました');
      };
      window.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp,{once:true});
    });
  });
}

function showToast(text){toast.textContent=text;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1900)}
function addLog(title,note){const t=nowHHMM();entries.push({start:t,end:hhmm(Math.min(22*60,mins(t)+15)),type:'log',title,note});renderTimetable();}
function getGpsSilently(actionName){
  // Chromeの位置情報は https / localhost などの安全な環境でないと取得できないことがあります。
  if(!navigator.geolocation){
    showToast('この環境では位置情報に対応していません。時刻のみ記録しました。');
    gpsLog.style.display='block';
    gpsLog.textContent='内部記録：位置情報未対応 / 時刻のみ記録';
    return;
  }
  if(!window.isSecureContext){
    showToast('位置情報はHTTPS公開後に取得できます。時刻のみ記録しました。');
    gpsLog.style.display='block';
    gpsLog.textContent='内部記録：HTTPS未対応の表示環境 / GPS未取得 / 時刻のみ記録';
    return;
  }
  const options={enableHighAccuracy:true,timeout:15000,maximumAge:0};
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude.toFixed(6), lng=pos.coords.longitude.toFixed(6), acc=Math.round(pos.coords.accuracy);
      gpsLog.style.display='block';
      gpsLog.textContent=`内部記録：${actionName} / 緯度 ${lat} / 経度 ${lng} / 精度 約${acc}m`;
      showToast('位置情報を取得しました');
    },
    err=>{
      let msg='位置情報が取得できませんでした。時刻のみ記録しました。';
      let detail='原因不明';
      if(err.code===1){ msg='位置情報の許可が必要です。時刻のみ記録しました。'; detail='ブラウザまたは端末で位置情報が拒否されています'; }
      if(err.code===2){ msg='現在地を測位できませんでした。時刻のみ記録しました。'; detail='屋内・電波状況・端末測位の問題の可能性'; }
      if(err.code===3){ msg='位置情報取得がタイムアウトしました。時刻のみ記録しました。'; detail='測位に時間がかかっています'; }
      showToast(msg);
      gpsLog.style.display='block';
      gpsLog.textContent=`内部記録：GPS未取得 / ${detail} / 時刻のみ記録`;
    },
    options
  );
}
function setButton(next){state=next;mainBtn.className='main-action';if(next==='start'){mainBtn.classList.add('start');mainBtn.textContent='▶ 作業開始';statusPill.textContent='到着済み'}if(next==='break'){mainBtn.classList.add('break');mainBtn.textContent='⏸ 休憩開始';statusPill.textContent='作業中'}if(next==='resume'){mainBtn.classList.add('start');mainBtn.textContent='▶ 作業再開';statusPill.textContent='休憩中'}if(next==='leave'){mainBtn.classList.add('leave');mainBtn.textContent='🏁 現場退出';statusPill.textContent='作業中'}if(next==='done'){mainBtn.classList.add('arrive');mainBtn.textContent='✅ 本日の記録完了';mainBtn.disabled=true;statusPill.textContent='退出済み'}}
mainBtn.addEventListener('click',()=>{if(state==='arrive'){addLog('📍 現場到着','GPSは裏で取得・記録');getGpsSilently('現場到着');setButton('start')}else if(state==='start'){addLog('▶ 作業開始','A邸 改修工事 / 床下地');getGpsSilently('作業開始');setButton('break')}else if(state==='break'){addLog('⏸ 休憩開始','休憩時間を記録');setButton('resume')}else if(state==='resume'){addLog('▶ 作業再開','作業を再開');setButton('leave')}else if(state==='leave'){addLog('🏁 現場退出','GPSは裏で取得・記録');getGpsSilently('現場退出');setButton('done')}});
